name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format ────────────────────────────────────────────────────────────────────
  format:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint backend
        run: npm run lint --prefix backend

      - name: Lint frontend
        run: npm run lint --prefix frontend

  # ── Type-check ────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Type-check backend
        run: npx --prefix backend tsc --noEmit

      - name: Type-check frontend
        run: npx --prefix frontend tsc --noEmit

  # ── Security ──────────────────────────────────────────────────────────────────
  security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit backend dependencies
        run: npm audit --audit-level=high --prefix backend

      - name: Audit frontend dependencies
        # --omit=dev: the remaining high/critical findings here are all in the
        # vitest/vite/happy-dom toolchain, which is dev-only and never ships
        # in the production build. Bumping them (vitest 1.x→4.x, vite 5→8) is
        # tracked separately since it previously cascaded into unrelated
        # storybook breakage when attempted.
        run: npm audit --audit-level=high --omit=dev --prefix frontend

  # ── Backend tests ─────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Frontend tests ────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Frontend build ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Smart contract ────────────────────────────────────────────────────────────
  contract:
    name: Smart Contract (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/hazina-escrow
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build contract
        run: cargo build --release

      - name: Run contract tests
        run: cargo test

      - name: Run contract integration tests
        run: |
          docker run --detach --rm -p 8000:8000 stellar/quickstart:testing --testnet
          sleep 5
          cargo test --features integration-tests
